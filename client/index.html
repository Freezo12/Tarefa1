<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Livraria Cliente-Servidor</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    margin: 0;
}

header {
    background: #333;
    color: white;
    text-align: center;
    padding: 20px;
}

.container {
    width: 80%;
    margin: 30px auto;
}

form {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 20px;
}

input, button {
    padding: 10px;
    font-size: 15px;
}

button {
    grid-column: span 4;
    background: #333;
    color: white;
    border: none;
    cursor: pointer;
}

.livro {
    background: white;
    padding: 15px;
    margin-bottom: 10px;
    border-left: 5px solid #333;
}

.vazio {
    color: gray;
    text-align: center;
}

@media (max-width: 700px) {
    form {
        grid-template-columns: 1fr;
    }

    button {
        grid-column: span 1;
    }
}
</style>
</head>

<body>

<header>
    <h1>📚 Livraria</h1>
    <p>Arquitetura Cliente-Servidor</p>
</header>

<div class="container">

<form id="formFiltro">
    <input type="text" id="titulo" placeholder="Título">
    <input type="text" id="autor" placeholder="Autor">
    <input type="text" id="genero" placeholder="Gênero">
    <input type="number" id="ano" placeholder="Ano">
    <button type="submit">Filtrar</button>
</form>

<div id="resultado"></div>

</div>

<script>
const API_URL = "http://127.0.0.1:5000/api/livros";

async function buscarLivros(event) {
    if (event) {
        event.preventDefault();
    }

    const titulo = document.getElementById("titulo").value;
    const autor = document.getElementById("autor").value;
    const genero = document.getElementById("genero").value;
    const ano = document.getElementById("ano").value;

    const url = `${API_URL}?titulo=${titulo}&autor=${autor}&genero=${genero}&ano=${ano}`;

    const resposta = await fetch(url);
    const livros = await resposta.json();

    mostrarLivros(livros);
}

function mostrarLivros(livros) {
    const resultado = document.getElementById("resultado");
    resultado.innerHTML = "";

    if (livros.length === 0) {
        resultado.innerHTML = "<p class='vazio'>Nenhum livro encontrado.</p>";
        return;
    }

    livros.forEach(livro => {
        resultado.innerHTML += `
            <div class="livro">
                <h3>${livro.titulo}</h3>
                <p><strong>Autor:</strong> ${livro.autor}</p>
                <p><strong>Gênero:</strong> ${livro.genero}</p>
                <p><strong>Ano:</strong> ${livro.ano}</p>
            </div>
        `;
    });
}

document.getElementById("formFiltro").addEventListener("submit", buscarLivros);

buscarLivros();
</script>

</body>
</html>
